<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seja sincero, bonitão</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin-top: 100px;
  background-color: #ffe6f0;
  overflow: hidden;
}

h1 { color: #992e51; }

button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
}

#sim { background-color: #4CAF50; color: white; }
#nao { background-color: #f44336; color: white; }

img {
  margin-top: 20px;
  max-width: 300px;
  border-radius: 10px;
}

.neon {
  animation: neon 0.8s infinite alternate;
  box-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
}

@keyframes neon {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}
</style>
</head>

<body>

<h1 id="pergunta">Você está com saudade de mim?🥺</h1>

<button id="sim">Sim</button>
<button id="nao">Não</button>

<div id="resultado"></div>

<!-- SOUND -->
<div id="audioUnlock"
onclick="unlockAudio()"
style="
position:fixed;
top:10px;
right:10px;
width:42px;
height:42px;
background:#111;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
border-radius:8px;
cursor:pointer;
z-index:9999;
">
🔊
</div>

<iframe
id="music"
width="1"
height="1"
style="opacity:0.01;position:absolute;bottom:0;"
allow="autoplay"
src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/djsantozz/valesca-popozuda-mousik-pagodin-deejay-santoz-igor-guimaraes-ragga-mix&auto_play=false">
</iframe>

<script src="https://w.soundcloud.com/player/api.js"></script>

<script>
let widget;
let audioUnlocked = false;

let tentativas = 0;
let tamanhoSim = 18;
let modoConfirmacao = false;

const botaoSim = document.getElementById("sim");
const botaoNao = document.getElementById("nao");

function unlockAudio(){
  if(audioUnlocked) return;
  audioUnlocked = true;
  widget = SC.Widget(document.getElementById("music"));
  widget.load(
    "https://soundcloud.com/djsantozz/valesca-popozuda-mousik-pagodin-deejay-santoz-igor-guimaraes-ragga-mix",
    { auto_play: false }
  );
}

function tocarMusica(){
  if(audioUnlocked && widget){
    widget.play();
  }
}

  botaoSim.addEventListener("click", () => {

  if(!modoConfirmacao){

    modoConfirmacao = true;
    document.getElementById("pergunta").innerText = "Tem certeza? 😏";

    botaoNao.style.position = "absolute";
    botaoNao.onmouseover = fugir;
    botaoNao.ontouchstart = fugir;

    tocarMusica();

  } else {
    respostaSim();
  }

  crescerSim();
});

botaoNao.addEventListener("click", () => {

  if(!modoConfirmacao){

    modoConfirmacao = true;

    document.getElementById("pergunta").innerText = "Papo de vacilo, tente novamente 😒";

    botaoSim.classList.add("neon");

  } else {

    tentativas++;

    if(tentativas === 1){
      document.getElementById("pergunta").innerText = "Tá tentando mesmo? 👀";
      return;
    }

    document.getElementById("resultado").innerHTML = `
      <p>😑</p>
      <img src="https://i.pinimg.com/236x/2f/c5/42/2fc5429cc937124e13e1b4ff059bc1c5.jpg">
    `;
  }

  crescerSim();
});

function fugir(){

  tentativas++;

  const largura = window.innerWidth - 100;
  const altura = window.innerHeight - 100;

  botaoNao.style.left = Math.random() * largura + "px";
  botaoNao.style.top = Math.random() * altura + "px";

  tamanhoSim += 5;
  botaoSim.style.fontSize = tamanhoSim + "px";

  const pergunta = document.getElementById("pergunta");

  if(tentativas === 1) pergunta.innerText = "Tem certeza mesmo? 😏";
  else if(tentativas === 2) pergunta.innerText = "Sério isso?? 😒";
  else if(tentativas === 3) pergunta.innerText = "Última chance... 👀";
  else pergunta.innerText = "Para de tentar clicar no NÃO, cabeça de pika 😂";
}

function crescerSim(){
  tamanhoSim += 5;
  botaoSim.style.fontSize = tamanhoSim + "px";
}

  function respostaSim(){

  document.getElementById("resultado").innerHTML = `
    <p>Pois mostre a pica agora 💖</p>
    <img src="https://www.cantadascasa.com/images/lines/limao-cantadas-j-chupei-limo-j-chupei-ameixa-s-no-chupei-voc-porq.jpg">
    <br><br>
    <button onclick="tocarMusica()">Tocar música 💖</button>
  `;
}

</script>

</body>
</html>
